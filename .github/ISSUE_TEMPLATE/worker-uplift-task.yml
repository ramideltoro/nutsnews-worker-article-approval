name: Worker uplift task
description: Track repo-local worker-uplift implementation work.
title: "[Task] "
labels:
  - worker-uplift
body:
  - type: markdown
    attributes:
      value: |
        Repository boundary: Consume approval jobs, call the Qwen approval endpoint with bounded concurrency and retries, store decisions in shadow state, and publish translation jobs only for approved articles.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will this be verified?
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: No production secret is added to this repository.
          required: true
        - label: The legacy nutsnews-worker ingestion path remains untouched.
          required: true
