name: Publish Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish-container:
    name: publish-container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE: ghcr.io/ramideltoro/nutsnews-worker-article-approval:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Detect Dockerfile
        id: dockerfile
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f Dockerfile ]]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until Dockerfile exists
        if: steps.dockerfile.outputs.has_dockerfile != 'true'
        run: echo "No Dockerfile is present yet."

      - name: Login to GHCR
        if: steps.dockerfile.outputs.has_dockerfile == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA-tagged image
        if: steps.dockerfile.outputs.has_dockerfile == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          labels: |
            org.opencontainers.image.source=https://github.com/ramideltoro/nutsnews-worker-article-approval
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Install cosign
        if: steps.dockerfile.outputs.has_dockerfile == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: steps.dockerfile.outputs.has_dockerfile == 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes "${IMAGE}"
